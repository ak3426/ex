<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Procedural Planet System</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

#controls{
position:absolute;
top:20px;
left:20px;
background:white;
padding:15px;
border-radius:6px;
width:220px;
}
</style>

</head>

<body>

<div id="controls">

<h3>Planet Controls</h3>

Scale
<input type="range" id="scale" min="10" max="150" value="50">

Amplitude
<input type="range" id="amp" min="1" max="20" value="8">

Octaves
<input type="range" id="oct" min="1" max="6" value="4">

<button id="regen">Regenerate</button>

<button id="sound">Play Sound</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene,camera,renderer,planet;
let time=0;

const params={
scale:50,
amp:8,
oct:4
};

function noise(x,y){
return Math.sin(x*0.3)+Math.cos(y*0.3);
}

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z=80;

renderer=new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(30,50,50);
scene.add(light);

generatePlanet();

animate();

}

function generatePlanet(){

if(planet) scene.remove(planet);

const geo=new THREE.SphereGeometry(30,128,128);

const pos=geo.attributes.position;

for(let i=0;i<pos.count;i++){

let v=new THREE.Vector3();
v.fromBufferAttribute(pos,i);

let n=noise(
v.x/params.scale,
v.y/params.scale
);

let h=n*params.amp;

v.normalize().multiplyScalar(30+h);

pos.setXYZ(i,v.x,v.y,v.z);

}

geo.computeVertexNormals();

const mat=new THREE.MeshStandardMaterial({
color:0x55aa55,
flatShading:true
});

planet=new THREE.Mesh(geo,mat);
scene.add(planet);

}

function animate(){

requestAnimationFrame(animate);

time+=0.01;

if(planet){
planet.rotation.y+=0.002;
}

renderer.render(scene,camera);

}

init();

document.getElementById("regen").onclick=()=>{
generatePlanet();
};

</script>

</body>
</html>
